<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberSecurity Training | SOC Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
      /* Forțăm fundalul negru pe toată pagina, chiar și în timp ce se încarcă React */
      html, body {
        background-color: #020617 !important; /* Negru-Cyber Deep */
        margin: 0;
        padding: 0;
        min-height: 100vh;
        color: #f8fafc;
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }

      /* Redundanță pentru animații - să fim siguri că merg */
      @keyframes scan {
        0% { top: 0; opacity: 0; }
        50% { opacity: 0.5; }
        100% { top: 100%; opacity: 0; }
      }
      .animate-scan {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #3b82f6, transparent);
        animation: scan 3s linear infinite;
        z-index: 10;
      }

      @keyframes glow-run {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .animate-glow-run {
        animation: glow-run 2s infinite;
      }

      /* Scrollbar Stilizat */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
